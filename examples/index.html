<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>avvatars</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: ui-monospace, monospace;
      background: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }
    h1 { font-size: 14px; font-weight: 400; margin-bottom: 40px; }
    .input-wrap {
      display: flex;
      gap: 10px;
      margin-bottom: 40px;
    }
    input {
      font-family: inherit;
      font-size: 14px;
      padding: 12px 16px;
      border: 1px solid #000;
      width: 400px;
      outline: none;
    }
    button {
      font-family: inherit;
      font-size: 14px;
      padding: 12px 24px;
      border: 1px solid #000;
      background: #000;
      color: #fff;
      cursor: pointer;
    }
    button:hover { background: #333; }
    #avatar {
      width: 200px;
      height: 200px;
      border: 1px solid #eee;
    }
    .examples {
      display: flex;
      gap: 20px;
      margin-top: 60px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .examples svg {
      width: 80px;
      height: 80px;
      cursor: pointer;
      border: 1px solid #eee;
    }
    .examples svg:hover { border-color: #000; }
  </style>
</head>
<body>
  <h1>avvatars</h1>

  <div class="input-wrap">
    <input type="text" id="seed" placeholder="Enter seed (address, ENS, etc.)" value="0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045">
    <button onclick="generate()">Generate</button>
  </div>

  <div id="avatar"></div>

  <div class="examples" id="examples"></div>

  <script type="module">
    import { avvatar } from '../dist/index.mjs'

    window.avvatar = avvatar

    window.generate = function() {
      const seed = document.getElementById('seed').value || Math.random().toString()
      const svg = avvatar({ seed, size: 200 })
      document.getElementById('avatar').innerHTML = svg
    }

    // Generate initial avatar
    generate()

    // Generate example avatars
    const examples = [
      '0xAb5801a7D398351b8bE11C439e05C5B3259aeC9B',
      'vitalik.eth',
      'jack.eth',
      '0xdeadbeef',
      '0xcafebabe',
      'satoshi',
    ]

    const examplesEl = document.getElementById('examples')
    examples.forEach(seed => {
      const div = document.createElement('div')
      div.innerHTML = avvatar({ seed, size: 80 })
      div.onclick = () => {
        document.getElementById('seed').value = seed
        generate()
      }
      examplesEl.appendChild(div)
    })
  </script>
</body>
</html>
